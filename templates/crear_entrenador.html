<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Entrenador - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="New Life Gym Logo">
            </a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('admin_dashboard') }}">Volver al Dashboard</a></li>
                <li><a href="{{ url_for('admin_logout') }}" style="color: var(--primary-color);">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem; max-width: 700px;">
        <div class="card">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">🏃 Nuevo Entrenador</h1>
            
            <form method="POST" enctype="multipart/form-data" class="admin-form">
                <!-- FOTO DEL ENTRENADOR -->
                <div class="form-group">
                    <label>Foto del Entrenador</label>
                    <div class="image-upload-wrapper" id="uploadWrapper">
                        <input type="file" name="imagen" id="imagenInput" accept="image/*" onchange="previewImage(this, 'preview', 'uploadWrapper')">
                        <div class="upload-placeholder">
                            <span class="upload-icon">📷</span>
                            <p>Arrastra una foto o <span>haz clic para seleccionar</span></p>
                            <p style="font-size:0.8rem; margin-top:0.3rem;">JPG, PNG, WEBP · Máx 5MB</p>
                        </div>
                    </div>
                    <div class="image-preview-box circle" id="preview"></div>
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre Completo *</label>
                    <input type="text" id="nombre" name="nombre" required class="form-control"
                           placeholder="Ej: Carlos Mendoza">
                </div>

                <div class="form-group">
                    <label for="especialidad">Especialidad *</label>
                    <input type="text" id="especialidad" name="especialidad" required class="form-control"
                           placeholder="Ej: Entrenamiento Funcional">
                </div>

                <div class="form-group">
                    <label for="experiencia">Años de Experiencia *</label>
                    <input type="text" id="experiencia" name="experiencia" required class="form-control"
                           placeholder="Ej: 8 años">
                </div>

                <div class="form-group">
                    <label for="certificaciones">Certificaciones</label>
                    <textarea id="certificaciones" name="certificaciones" rows="3" class="form-control"
                              placeholder="Ej: NSCA-CPT, CrossFit L2"></textarea>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="3" class="form-control"
                              placeholder="Breve descripción del entrenador"></textarea>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control"
                           placeholder="entrenador@newlifegym.com">
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" class="form-control"
                           placeholder="555-0100">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Crear Entrenador</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script>
    function previewImage(input, previewId, wrapperId) {
        const preview = document.getElementById(previewId);
        const wrapper = document.getElementById(wrapperId);
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                preview.style.display = 'block';
                wrapper.querySelector('.upload-placeholder').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
