<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Miembro - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="New Life Gym Logo">
            </a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('admin_dashboard') }}">Volver al Dashboard</a></li>
                <li><a href="{{ url_for('admin_logout') }}" style="color: var(--primary-color);">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem; max-width: 600px;">
        <div class="card">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">✏️ Editar Miembro</h1>

            <form method="POST" action="{{ url_for('editar_miembro', id_miembro=miembro.id_miembro) }}" class="admin-form">
                <div class="form-group">
                    <label for="nombre">Nombre Completo *</label>
                    <input type="text" id="nombre" name="nombre" value="{{ miembro.nombre }}" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" value="{{ miembro.email }}" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono *</label>
                    <input type="tel" id="telefono" name="telefono" value="{{ miembro.telefono }}" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento"
                           value="{{ miembro.fecha_nacimiento }}" class="form-control">
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <textarea id="direccion" name="direccion" rows="3" class="form-control">{{ miembro.direccion }}</textarea>
                </div>

                <div class="form-group">
                    <label for="estado">Estado *</label>
                    <select id="estado" name="estado" required class="form-control">
                        <option value="activo" {% if miembro.estado == 'activo' %}selected{% endif %}>Activo</option>
                        <option value="inactivo" {% if miembro.estado == 'inactivo' %}selected{% endif %}>Inactivo</option>
                        <option value="suspendido" {% if miembro.estado == 'suspendido' %}selected{% endif %}>Suspendido</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
