<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Plan - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="New Life Gym Logo">
            </a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('admin_dashboard') }}">Volver al Dashboard</a></li>
                <li><a href="{{ url_for('admin_logout') }}" style="color: var(--primary-color);">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem; max-width: 600px;">
        <div class="card">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">🔄 Cambiar Plan de Membresía</h1>
            
            <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
                <h3 style="margin: 0 0 0.5rem 0;">Miembro:</h3>
                <p style="font-size: 1.2rem; margin: 0;"><strong>{{ miembro.nombre }}</strong></p>
                <p style="color: #666; margin: 0.5rem 0 0 0;">{{ miembro.email }}</p>
            </div>

            <form method="POST" class="admin-form">
                <div class="form-group">
                    <label for="nuevo_plan">Nuevo Plan *</label>
                    <select id="nuevo_plan" name="nuevo_plan" required class="form-control">
                        <option value="">Seleccionar plan...</option>
                        {% for plan in planes %}
                        <option value="{{ plan.id_plan }}">
                            {{ plan.nombre }} - ${{ "%.2f"|format(plan.precio_mensual) }}/mes
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="meses">Duración (meses) *</label>
                    <select id="meses" name="meses" required class="form-control">
                        <option value="1">1 mes</option>
                        <option value="3">3 meses</option>
                        <option value="6">6 meses</option>
                        <option value="12">12 meses</option>
                    </select>
                </div>

                <div class="alert alert-info" style="margin-bottom: 2rem; padding: 1rem; background: #d1ecf1; border-radius: 8px; border: 1px solid #bee5eb;">
                    <strong>Nota:</strong> Se cancelará la membresía actual y se creará una nueva con el plan seleccionado.
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Cambiar Plan</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
