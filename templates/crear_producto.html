<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="New Life Gym Logo">
            </a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('admin_dashboard') }}">Volver al Dashboard</a></li>
                <li><a href="{{ url_for('admin_logout') }}" style="color: var(--primary-color);">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem; max-width: 700px;">
        <div class="card">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">🛒 Nuevo Producto</h1>
            
            <form method="POST" enctype="multipart/form-data" class="admin-form">
                <!-- IMAGEN DEL PRODUCTO -->
                <div class="form-group">
                    <label>Imagen del Producto</label>
                    <div class="image-upload-wrapper" id="uploadWrapper">
                        <input type="file" name="imagen" id="imagenInput" accept="image/*" onchange="previewImage(this, 'preview', 'uploadWrapper')">
                        <div class="upload-placeholder">
                            <span class="upload-icon">🖼️</span>
                            <p>Arrastra una imagen o <span>haz clic para seleccionar</span></p>
                            <p style="font-size:0.8rem; margin-top:0.3rem;">JPG, PNG, WEBP · Máx 5MB</p>
                        </div>
                    </div>
                    <div class="image-preview-box" id="preview"></div>
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre del Producto *</label>
                    <input type="text" id="nombre" name="nombre" required class="form-control"
                           placeholder="Ej: Proteína Whey Gold Standard">
                </div>

                <div class="form-group">
                    <label for="categoria">Categoría *</label>
                    <select id="categoria" name="categoria" required class="form-control">
                        <option value="">Seleccionar categoría...</option>
                        <option value="Proteínas">Proteínas</option>
                        <option value="Suplementos">Suplementos</option>
                        <option value="Pre-Entreno">Pre-Entreno</option>
                        <option value="Recuperación">Recuperación</option>
                        <option value="Vitaminas">Vitaminas</option>
                        <option value="Accesorios">Accesorios</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="precio">Precio ($) *</label>
                    <input type="number" id="precio" name="precio" step="0.01" 
                           required class="form-control" placeholder="299.00">
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="3" class="form-control"
                              placeholder="Descripción breve del producto"></textarea>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="stock" name="stock" checked>
                        Producto en Stock
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Crear Producto</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script>
    function previewImage(input, previewId, wrapperId) {
        const preview = document.getElementById(previewId);
        const wrapper = document.getElementById(wrapperId);
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                preview.style.display = 'block';
                wrapper.querySelector('.upload-placeholder').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
