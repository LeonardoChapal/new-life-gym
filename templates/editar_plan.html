<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Plan - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="New Life Gym Logo">
            </a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('admin_dashboard') }}">Volver al Dashboard</a></li>
                <li><a href="{{ url_for('admin_logout') }}" style="color: var(--primary-color);">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem; max-width: 700px;">
        <div class="card">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">✏️ Editar Plan</h1>
            
            <form method="POST" enctype="multipart/form-data" class="admin-form">
                <!-- IMAGEN DEL PLAN -->
                <div class="form-group">
                    <label>Imagen del Plan</label>

                    {% if plan.imagen %}
                    <div class="image-current" id="currentImg">
                        <img src="{{ url_for('imagen_plan', id_plan=plan.id_plan) }}" alt="{{ plan.nombre }}">
                        <p>Imagen actual — sube una nueva para reemplazarla</p>
                    </div>
                    {% endif %}

                    <div class="image-upload-wrapper" id="uploadWrapper">
                        <input type="file" name="imagen" id="imagenInput" accept="image/*" onchange="previewImage(this, 'preview', 'uploadWrapper', 'currentImg')">
                        <div class="upload-placeholder">
                            <span class="upload-icon">🖼️</span>
                            <p>Arrastra una imagen o <span>haz clic para seleccionar</span></p>
                            <p style="font-size:0.8rem; margin-top:0.3rem;">JPG, PNG, WEBP · Máx 5MB</p>
                        </div>
                    </div>
                    <div class="image-preview-box" id="preview"></div>
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre del Plan *</label>
                    <input type="text" id="nombre" name="nombre" value="{{ plan.nombre }}" 
                           required class="form-control">
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="3" 
                              class="form-control">{{ plan.descripcion }}</textarea>
                </div>

                <div class="form-group">
                    <label for="precio_mensual">Precio Mensual ($) *</label>
                    <input type="number" id="precio_mensual" name="precio_mensual" 
                           value="{{ plan.precio_mensual }}" step="0.01" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="beneficios">Beneficios (uno por línea)</label>
                    <textarea id="beneficios" name="beneficios" rows="5" 
                              class="form-control">{{ plan.beneficios }}</textarea>
                </div>

                <div class="form-group">
                    <label for="duracion_meses">Duración (meses) *</label>
                    <input type="number" id="duracion_meses" name="duracion_meses" 
                           value="{{ plan.duracion_meses }}" required class="form-control">
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="activo" name="activo" 
                               {% if plan.activo %}checked{% endif %}>
                        Plan Activo
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script>
    function previewImage(input, previewId, wrapperId, currentId) {
        const preview = document.getElementById(previewId);
        const wrapper = document.getElementById(wrapperId);
        const current = currentId ? document.getElementById(currentId) : null;
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                preview.innerHTML = `<img src="${e.target.result}" alt="Nueva imagen">`;
                preview.style.display = 'block';
                wrapper.querySelector('.upload-placeholder').style.display = 'none';
                if (current) current.style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
