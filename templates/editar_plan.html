<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Plan - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="New Life Gym Logo">
            </a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('admin_dashboard') }}">Volver al Dashboard</a></li>
                <li><a href="{{ url_for('admin_logout') }}" style="color: var(--primary-color);">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem; max-width: 700px;">
        <div class="card">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">Nuevo Plan de Membresía</h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="admin-form">

                <div class="form-group">
                    <label for="nombre">Nombre del Plan *</label>
                    <input type="text" id="nombre" name="nombre" required class="form-control"
                           placeholder="Ej: Básico, Estándar, Premium">
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="3" class="form-control"
                              placeholder="Descripción breve del plan"></textarea>
                </div>

                <div class="form-group">
                    <label for="precio_mensual">Precio Mensual ($) *</label>
                    <input type="number" id="precio_mensual" name="precio_mensual" step="0.01"
                           required class="form-control" placeholder="299.00">
                </div>

                <div class="form-group">
                    <label for="beneficios">Beneficios (uno por línea)</label>
                    <textarea id="beneficios" name="beneficios" rows="5" class="form-control"
                              placeholder="Acceso a todas las máquinas&#10;Clases grupales incluidas&#10;Asesoría nutricional"></textarea>
                </div>

                <div class="form-group">
                    <label for="duracion_meses">Duración (meses) *</label>
                    <input type="number" id="duracion_meses" name="duracion_meses"
                           required class="form-control" value="1" min="1">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Crear Plan</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
